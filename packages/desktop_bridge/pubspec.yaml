name: desktop_bridge
description: >-
  A Flutter plugin package that bridges desktop platform channels and native FFI
  bindings for wallpaper operations (set wallpaper, pause, resume, quit).
version: 0.1.0
homepage: https://github.com/your-org/ai_weather_wallpaper

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.0
  ffi: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^5.1.0

flutter:
  plugin:
    platforms:
      windows:
        pluginClass: DesktopBridgePlugin
