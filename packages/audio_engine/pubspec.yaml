name: audio_engine
description: >-
  A Flutter package for background ambient audio playback, mixing, and effects.
  Provides built-in presets for Rain, Ocean, Forest, WhiteNoise, PinkNoise,
  and BrownNoise.
version: 0.1.0
homepage: https://github.com/your-org/ai_weather_wallpaper

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  audioplayers: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^5.1.0
